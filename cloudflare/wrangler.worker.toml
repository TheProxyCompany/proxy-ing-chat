name = "proxy-ing-router"
main = "wildcard-router-worker.ts"
compatibility_date = "2026-03-03"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

routes = [
  { pattern = "*.proxy.ing/*", zone_name = "proxy.ing" },
  { pattern = "*.proxy.ing", zone_name = "proxy.ing" }
]

[vars]
PAGES_ORIGIN = "proxy-ing-chat.pages.dev"
